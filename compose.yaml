services:
  backend:
    build:
      context: .
      dockerfile: src/backend/Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TheHat: Data Source=/app/data/thehat.db
    ports:
      - "${THE_HAT_API_PORT:-5000}:8080"
    volumes:
      - thehat-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8080}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${THE_HAT_FRONTEND_PORT:-4173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  thehat-data:
